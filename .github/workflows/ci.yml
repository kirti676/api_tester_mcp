name: CI

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install lint tools
        run: pip install "black==26.3.1" "isort==8.0.1"

      - name: Check formatting with black
        run: black --check --target-version py310 api_tester_mcp/

      - name: Check imports with isort
        run: isort --check-only api_tester_mcp/

  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ['3.10', '3.11', '3.12']
        node-version: ['18', '20', '22']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest pytest-asyncio

      - name: Install Node.js dependencies
        run: npm install --ignore-scripts

      - name: Test Python package
        run: |
          python -c "import api_tester_mcp; print('Import successful')"
          python -m api_tester_mcp --help

      - name: Test npm package
        shell: bash
        run: |
          node cli.js --help
          node scripts/postinstall.js || true

      - name: Test installation
        run: |
          # Test the postinstall script works
          node scripts/postinstall.js
